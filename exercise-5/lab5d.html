
<!DOCTYPE html>
<html>
<head>
<title>CSS Box Model Example</title>

<style>

.box{
width:300px;                 /* Content width */
background-color:rgb(232, 139, 25);  /* Content area color */

padding:40px;                /* Space between content and border */

border:20px solid rgb(58, 79, 33);       /* Border around the element */

margin:10px;                 /* Space outside the border */

}

</style>
</head>

<body>

<h2>CSS Box Model Example</h2>

<div class="box">
samba is good man and he will do the hardwork for his family and also 
he will do some at the college at the correct time.
</div>

</body>
</html>
