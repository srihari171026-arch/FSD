<!DOCTYPE html>
<html>
<head>
    <title>String Example</title>
    <script>
        function showString() {
            let text = "srihari";

            document.getElementById("output").innerText =
                "Length: " + text.length +
                "\nUppercase: " + text.toUpperCase() +
                "\nLowercase: " + text.toLowerCase();
        }
    </script>
</head>
<body>

<button onclick="showString()">Click Me to see miracales</button>
<p id="output"></p>

</body>
</html>
