<!DOCTYPE html>
<html lang="en">
<head>
    <title>lab 2c</title>
</head>
<body>
   <h2>lab 2c experiments</h2>
    <h3>student registration form</h3>
    <form>
        <table border="1" cellpadding="10" cellspacing="15">
            <tr>
                <td>First Name:</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>password</td>
                <td><input type="password"></td>
            </tr>
            <tr>
                <td>age</td>
                <td><input type="number"></td>
            </tr>
            <tr>
                <td>date of birth</td>
                <td><input type="date"></td>
                </tr>
            <tr>
                <td>gender</td>
                <td>
                    <input type="radio" name="g">male
                    <input type="radio" name="g">female
                    <color="blue"><input type="radio" name="g">other
                </td>
            </tr>
            <tr>
                <td>hobbies</td>
                <td>
                    <input type="checkbox" name="h1">instagram
                    <input type="checkbox" name="h2">facebook
                    <input type="checkbox" name="h3">twitter
                </td>
            </tr>
            <tr>
                <td>course</td>
                <td>
                    <select>
                        <option>select</option>
                        <option>java</option>
                        <option>python</option>
                        <option>web development</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>address</td>
                <td>
                    <textarea rows="5" cols="30"></textarea>
                </td>
            </tr>
            <tr>
                <td colspan="3" align="center"</td>
                <input type="submit"</td>
                <input type="reset"</td>
            </tr>
        </table>
    </form>
</body>
</html>
